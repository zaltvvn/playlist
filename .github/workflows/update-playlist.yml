name: Update All M3U Playlists

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  deploy-playlists:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Playlist Repo
        uses: actions/checkout@v3

      - name: Checkout Backup Repo
        uses: actions/checkout@v3
        with:
          repository: zaltvvn/backup
          token: ${{ secrets.ENGINE_TOKEN }}
          path: backup

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # Chạy lần lượt cả 2 Script
      - name: Run Scripts
        run: |
          python backup/get-playlist-ae.py
          python backup/get-playlist-in.py

      # Gom cả 2 file vào chung 1 thư mục
      - name: Prepare Output Folder
        run: |
          mkdir -p final_output
          
          if [ -f "playlist_ae.m3u" ]; then
            mv playlist_ae.m3u final_output/
            echo "✅ Gom file AE thành công!"
          else
            echo "⚠️ Không tìm thấy file AE!"
          fi
          
          if [ -f "playlist_in.m3u" ]; then
            mv playlist_in.m3u final_output/
            echo "✅ Gom file IN thành công!"
          else
            echo "⚠️ Không tìm thấy file IN!"
          fi

     # Bước mới: Lấy giờ VN (đã làm ở bước trước)
      - name: Get Current Time
        run: echo "TIME_NOW=$(TZ='Asia/Ho_Chi_Minh' date +'%d/%m %H:%M')" >> $GITHUB_ENV

      # Bước Deploy thủ công: Thay thế hoàn toàn peaceiris/actions-gh-pages
      - name: Manual Deploy to m3u Branch
        run: |
          cd final_output
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto Update: All Playlists - Cập nhật lúc ${{ env.TIME_NOW }}"
          git push --force "https://x-access-token:${{ secrets.ENGINE_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:m3u
